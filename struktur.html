<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Struktur Organisasi - RISMA</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    /* LOADING */
    #loading {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: #2c3e50;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
      color: white;
    }

    .logo {
      width: 120px;
      animation: fade 2s infinite;
    }

    @keyframes fade {
      0% { opacity: 0; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.9); }
    }

    /* NAVBAR */
    nav {
      position: fixed;
      width: 100%;
      padding: 15px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s;
      z-index: 1000;
      background: rgba(0,0,0,0.7);
    }

    nav h2 {
      color: white;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }

    /* STRUKTUR */
    #struktur {
      padding: 50px;
      background: #f4f4f4;
      text-align: center;
      padding-top: 120px; /* Adjust for fixed navbar */
    }

    .card {
      background: white;
      padding: 15px;
      margin: 15px;
      border-radius: 15px;
      display: inline-block;
      width: 200px;
      transition: 0.3s;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

  </style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
  <img src="https://i.pravatar.cc/200" class="logo">
  <h2>Memuat Website...</h2>
</div>

<!-- NAVBAR -->
<nav id="navbar">
  <h2>RISMA</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="struktur.html">Struktur</a>

<script>
  // LOADING
  setTimeout(() => {
    document.getElementById("loading").style.display = "none";
  }, 3000);

  // NAVBAR SCROLL (though it's fixed background)
