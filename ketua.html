<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Anggota - RISMA</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* CONTAINER */
    .detail-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 900px;
      width: 100%;
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      animation: slideInUp 0.6s ease-out;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeOutBlur {
      from {
        opacity: 1;
        filter: blur(0px);
      }
      to {
        opacity: 0;
        filter: blur(8px);
      }
    }

    /* PHOTO SECTION */
    .photo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: zoomIn 0.6s ease-out 0.2s both;
    }

    .photo-container {
      position: relative;
      width: 250px;
      height: 350px;
      margin-bottom: 30px;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
    }

    .photo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-frame {
      position: absolute;
      top: -5px;
      left: -5px;
      right: -5px;
      bottom: -5px;
      border: 3px solid #667eea;
      border-radius: 15px;
      pointer-events: none;
      z-index: 1;
    }

    /* FOTO UTAMA */
.photo-section .photo-container:first-child {
  width: 250px;
  height: 350px;
}

/* FOTO 2 */
.photo-section .photo-container:nth-child(2) {
  width: 140px;
  height: 200px;
  margin-top: 15px;
}

/* HILANGIN FRAME DI FOTO 2 */
.photo-section .photo-container:nth-child(2) .photo-frame {
  display: none;
}

    #detailPhoto2 {
  width: 140px;
  height: 200px;
  object-fit: cover;
  filter: none !important;
  opacity: 1 !important;
  transform: none !important;
  box-shadow: none !important;
}
    /* INFO SECTION */
    .info-section {
      animation: slideInLeft 0.6s ease-out 0.3s both;
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .info-section h1 {
      color: #2c3e50;
      font-size: 32px;
      margin-bottom: 10px;
    }

    .info-section .position {
      color: #667eea;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* BIODATA */
    .biodata {
      margin-bottom: 40px;
    }

    .biodata-item {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
      animation: fadeInLeft 0.6s ease-out forwards;
    }

    .biodata-item:nth-child(1) { animation-delay: 0.4s; }
    .biodata-item:nth-child(2) { animation-delay: 0.45s; }
    .biodata-item:nth-child(3) { animation-delay: 0.5s; }
    .biodata-item:nth-child(4) { animation-delay: 0.55s; }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .biodata-label {
      color: #999;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .biodata-value {
      color: #2c3e50;
      font-size: 16px;
      font-weight: 500;
    }

    /* MOTTO */
    .motto-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 30px;
      text-align: center;
      animation: fadeInUp 0.6s ease-out 0.6s both;
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .motto-section .label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .motto-section .text {
      font-size: 18px;
      font-weight: 600;
      font-style: italic;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* SOCIAL MEDIA */
    .social-media {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      animation: fadeInUp 0.6s ease-out 0.65s both;
    }

    .social-link {
      width: 50px;
      height: 50px;
      background: #f0f0f0;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: #667eea;
      transition: all 0.3s ease;
      font-size: 20px;
    }

    .social-link:hover {
      background: #667eea;
      color: white;
      transform: translateY(-5px);
    }

    /* BUTTONS */
    .buttons {
      display: flex;
      gap: 15px;
      animation: fadeInUp 0.6s ease-out 0.7s both;
    }

    .btn-back {
      flex: 1;
      padding: 15px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-back:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-back:active {
      transform: translateY(0);
    }

    .btn-home {
      flex: 1;
      padding: 15px 30px;
      background: #f0f0f0;
      color: #2c3e50;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-home:hover {
      background: #e0e0e0;
      transform: translateY(-2px);
    }

    /* ZOOM ANIMATION ELEMENTS */
    .zoom-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0);
      backdrop-filter: blur(0px);
      z-index: 1500;
      opacity: 0;
      pointer-events: none;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .zoom-backdrop.active {
      opacity: 1;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .detail-container {
        grid-template-columns: 1fr;
        gap: 30px;
        padding: 30px 20px;
      }

      .info-section h1 {
        font-size: 24px;
      }

      .photo-container {
        width: 200px;
        height: 280px;
      }

      body {
        min-height: auto;
        padding: 20px;
      }
    }
  </style>
</head>

// LOAD DATA
function loadData() {
  let role = sessionStorage.getItem('selectedRole') || 'ketua';
  const data = anggotaData[role];

  if (data) {
    document.getElementById('detailName').textContent = data.name;
    document.getElementById('detailRole').textContent = data.role;
    document.getElementById('detailPhoto').src = data.image;
    const img2 = document.getElementById('detailPhoto2');

    if (data.image2) {
    img2.src = data.image2;
    img2.style.display = "block";
} else {
    img2.style.display = "none";
}
    const biodata = document.querySelectorAll('.biodata-value');
    if (biodata[0]) biodata[0].textContent = data.age;
    if (biodata[1]) biodata[1].textContent = data.address;
    if (biodata[2]) biodata[2].textContent = data.instagram;
    if (biodata[3]) biodata[3].textContent = data.phone;

    const igLink = document.getElementById('instagramLink');
    if (igLink && data.instagram !== '-') {
      const username = data.instagram.replace('@', '');
      igLink.href = "https://instagram.com/" + username;
      igLink.target = "_blank";
    }

    document.querySelector('.motto-section .text').textContent = data.motto;
  }
}


// ANIMASI BACK
function initZoomOutAnimation() {
  const btnBack = document.getElementById('btnBack');
  const container = document.querySelector('.detail-container');
  const backdrop = document.querySelector('.zoom-backdrop');

  btnBack.addEventListener('click', function(e) {
    e.preventDefault();

    container.style.animation = 'fadeOutBlur 0.6s forwards';
    backdrop.classList.add('active');

    setTimeout(() => {
      window.location.href = 'index.html#struktur';
    }, 650);
  });
}


// INIT
document.addEventListener('DOMContentLoaded', function() {
  loadData();
  initZoomOutAnimation();
});
